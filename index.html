<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tên Ngẫu Nhiên - Light Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body { 
            background: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
        }

        /* Thẻ Card tông sáng */
        .card-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s;
        }

        /* Vùng Họ Tên */
        .name-zone {
            background: #ffffff;
            padding: 12px;
            transition: background 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }
        .name-zone:active { background: #f8fafc; }

        /* Vùng Username tông xanh nhạt */
        .user-zone {
            background: #f0f7ff;
            padding: 10px 12px;
            transition: background 0.2s;
            position: relative;
        }
        .user-zone:active { background: #e0f0ff; }

        .mono { font-family: 'JetBrains Mono', monospace; word-break: break-all; }

        .refresh-btn-inline { 
            color: #3b82f6; 
            transition: all 0.2s; 
            padding: 4px;
            border-radius: 6px;
        }
        .refresh-btn-inline:hover { background: #dbeafe; }
        .refresh-btn-inline:active { transform: rotate(90deg); }

        /* Custom Input */
        #quantity-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-8 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
            <h1 class="text-xl font-black tracking-tight text-blue-600">
                TẠO TÊN <span class="text-slate-400 font-normal italic">Ngẫu Nhiên</span>
            </h1>

            <div class="flex items-center gap-3">
                <input type="number" id="quantity-input" value="10" min="1" max="100" 
                       class="font-bold text-slate-700 text-lg w-14 text-center py-1 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="generateList()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 px-6 rounded-2xl shadow-md active:scale-95 transition-all">
                    LÀM MỚI ✨
                </button>
            </div>
        </header>

        <div id="results-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </div>

    <!-- Toast thông báo -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl text-xs font-bold hidden shadow-2xl z-50"></div>

    <script>
        const dsHo = ["Nguyễn", "Trần", "Lê", "Phạm", "Hoàng", "Huỳnh", "Phan", "Vũ", "Võ", "Đặng", "Bùi", "Đỗ", "Hồ", "Ngô", "Dương", "Lý", "Vương", "Trịnh", "Lương", "Mai", "Đoàn", "Lâm", "Trương", "Hà", "Cao"];
        const dsDemNam = ["Văn", "Hữu", "Đức", "Minh", "Quang", "Anh", "Mạnh", "Trọng", "Thế", "Công", "Duy", "Hoàng", "Bảo", "Thành", "Quốc", "Phúc", "Nhật", "Đình", "Sĩ"];
        const dsDemNu = ["Thị", "Thanh", "Thu", "Ngọc", "Hồng", "Diệu", "Tuyết", "Mai", "Quỳnh", "Thảo", "Bích", "Kiều", "Phương", "Kim", "Như", "Khánh", "Trúc", "Tú", "Ánh"];
        const dsTen = ["An", "Anh", "Bảo", "Bình", "Băng", "Bích", "Cường", "Chi", "Chinh", "Công", "Cát", "Châu", "Danh", "Diệp", "Dũng", "Dương", "Duy", "Duyên", "Diệu", "Đạt", "Đông", "Đức", "Đan", "Đình", "Đăng", "Gia", "Giang", "Hà", "Hải", "Hạnh", "Hào", "Hân", "Hiền", "Hiếu", "Hoa", "Hòa", "Hùng", "Huy", "Huyền", "Hương", "Hưng", "Khang", "Khánh", "Khoa", "Khôi", "Kiên", "Kiệt", "Kiều", "Lam", "Lâm", "Linh", "Lộc", "Long", "Lan", "Liên", "Luân", "Lương", "Mai", "Minh", "Mỹ", "Mạnh", "My", "Nam", "Nga", "Ngân", "Nghĩa", "Nhân", "Nhi", "Nhung", "Nguyên", "Nguyệt", "Ngọc", "Nhật", "Phong", "Phú", "Phúc", "Phương", "Phát", "Phi", "Quân", "Quang", "Quốc", "Quý", "Quỳnh", "Sơn", "Sang", "Sáng", "Tâm", "Tấn", "Thắng", "Thành", "Thảo", "Thư", "Tiến", "Toàn", "Trang", "Triết", "Trí", "Trúc", "Trung", "Tú", "Tuấn", "Tùng", "Tường", "Tuyết", "Thanh", "Thịnh", "Thái", "Thiện", "Uyên", "Vinh", "Vy", "Vân", "Việt", "Vũ", "Văn", "Xuân", "Yến", "Ân", "Ánh", "Tuệ", "Trâm", "Nhã", "Vỹ"];

        function removeVietnameseTones(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').toLowerCase().replace(/\s/g, '');
        }

        function generateUser(fullName) {
            const parts = fullName.split(' ');
            const h = removeVietnameseTones(parts[0]);
            const d = removeVietnameseTones(parts[1]);
            const t = removeVietnameseTones(parts[parts.length - 1]);
            const hVT = h.charAt(0);
            const dVT = d.charAt(0);
            
            const chars = 'abcdefghijklmnopqrstuvwxyz';
            const randomPre = chars[Math.floor(Math.random() * 26)] + chars[Math.floor(Math.random() * 26)] + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) : "");
            const suffix = Math.random() > 0.4 ? Math.floor(Math.random() * 8999 + 1000) : Math.floor(Math.random() * 99) + chars[Math.floor(Math.random() * 26)];

            const nameStyles = [`${hVT}${dVT}${t}`, `${h}${dVT}${t}`, `${hVT}${d}${t}`, `${h}${d}${t}`];
            const baseName = nameStyles[Math.floor(Math.random() * nameStyles.length)];

            const finalStyles = [`${baseName}${suffix}`, `${randomPre}_${baseName}`, `${baseName}_${randomPre}`, `${baseName}.${suffix}`];
            return finalStyles[Math.floor(Math.random() * finalStyles.length)];
        }

        function refreshItem(event, btn) {
            event.stopPropagation();
            const card = btn.closest('.card-container');
            const name = card.querySelector('.name-display').innerText;
            const newUser = generateUser(name);
            const userDisplay = card.querySelector('.user-display');
            userDisplay.innerText = `@${newUser}`;
            userDisplay.dataset.copy = newUser;
        }

        function generateList() {
            let count = parseInt(document.getElementById('quantity-input').value) || 10;
            count = Math.min(Math.max(count, 1), 100);
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const isNam = Math.random() > 0.5;
                const ho = dsHo[Math.floor(Math.random() * dsHo.length)];
                const dem = isNam ? dsDemNam[Math.floor(Math.random() * dsDemNam.length)] : dsDemNu[Math.floor(Math.random() * dsDemNu.length)];
                const ten = dsTen[Math.floor(Math.random() * dsTen.length)];
                const fullName = `${ho} ${dem} ${ten}`;
                const user = generateUser(fullName);
                const div = document.createElement('div');
                div.className = "card-container rounded-2xl";
                div.innerHTML = `
                    <div class="name-zone cursor-pointer" onclick="copyValue('${fullName}')">
                        <span class="text-[9px] uppercase tracking-widest text-slate-400 font-bold block mb-1">Họ Tên</span>
                        <p class="name-display text-[13px] font-bold text-slate-800 truncate">${fullName}</p>
                    </div>
                    <div class="user-zone cursor-pointer" onclick="copyValue(this.querySelector('.user-display').dataset.copy)">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] uppercase tracking-widest text-blue-500 font-bold">Username</span>
                            <button onclick="refreshItem(event, this)" class="refresh-btn-inline">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h5M20 20v-5h-5M4 13a8.1 8.1 0 0015.4 3M20 11a8.1 8.1 0 00-15.4-3"></path></svg>
                            </button>
                        </div>
                        <p class="user-display mono text-[11px] text-blue-600 leading-tight" data-copy="${user}">@${user}</p>
                    </div>`;
                container.appendChild(div);
            }
        }

        function copyValue(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = `ĐÃ SAO CHÉP: ${text}`;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 1000);
            });
        }
        window.onload = generateList;
    </script>
</body>
</html>
