<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tên Ngẫu Nhiên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .user-badge { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .row-item { border-bottom: 1px solid #f1f5f9; transition: all 0.2s; }
        .row-item:hover { background-color: #f8fafc; }
        .row-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Tạo Tên Ngẫu Nhiên</h1>
            <div class="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <input type="number" id="quantity-input" min="1" max="100" value="10" 
                       class="w-12 text-center font-bold text-blue-600 focus:outline-none bg-transparent">
                <button onclick="generateList()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold text-sm transition-all active:scale-95">
                    TẠO MỚI ⚡
                </button>
            </div>
        </div>

        <div class="main-card border border-slate-200 overflow-hidden">
            <div id="results-container"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-2.5 rounded-full text-xs font-semibold hidden shadow-xl z-50"></div>

    <script>
        const dsHo = ["Nguyễn", "Trần", "Lê", "Phạm", "Hoàng", "Huỳnh", "Phan", "Vũ", "Võ", "Đặng", "Bùi", "Đỗ", "Hồ", "Ngô", "Dương", "Lý", "An", "Vương", "Trịnh", "Lương", "Mai", "Đào", "Đoàn", "Lâm", "Phùng", "Tống", "Trương", "Hứa", "Trình", "Tạ", "Hà", "Cao"];
        const dsDemNam = ["Văn", "Hữu", "Đức", "Minh", "Quang", "Anh", "Mạnh", "Trọng", "Thế", "Công", "Duy", "Hoàng", "Bảo", "Thành", "Quốc", "Phúc", "Tấn", "Nhật", "Đình", "Khắc", "Sĩ"];
        const dsDemNu = ["Thị", "Thanh", "Thu", "Ngọc", "Hồng", "Diệu", "Tuyết", "Mai", "Quỳnh", "Thảo", "Bích", "Kiều", "Phương", "Kim", "Như", "Minh", "Khánh", "Trúc", "Tú", "Ánh"];
        const dsTen = ["An", "Anh", "Bảo", "Bình", "Băng", "Bích", "Cường", "Chi", "Chinh", "Chấn", "Công", "Cảnh", "Cát", "Cầm", "Châu", "Chiêu", "Danh", "Diệp", "Dũng", "Dương", "Duy", "Duyên", "Diệu", "Đạt", "Đông", "Đức", "Đan", "Đình", "Đăng", "Đại", "Gia", "Giang", "Giao", "Hà", "Hải", "Hạnh", "Hào", "Hân", "Hiền", "Hiếu", "Hoa", "Hòa", "Hùng", "Huy", "Huyền", "Hương", "Hưng", "Hướng", "Hạ", "Kha", "Khang", "Khánh", "Khoa", "Khôi", "Kiên", "Kiệt", "Kiều", "Kỳ", "Khải", "Khiêm", "Khuê", "Lam", "Lâm", "Linh", "Lộc", "Long", "Lan", "Liên", "Liễu", "Lý", "Luân", "Lương", "Mai", "Minh", "Mỹ", "Mạnh", "Mẫn", "Mi", "My", "Nam", "Nga", "Ngân", "Nghĩa", "Nhân", "Nhi", "Nhung", "Nguyên", "Nguyệt", "Ngọc", "Nhàn", "Nhật", "Nhiên", "Phong", "Phú", "Phúc", "Phương", "Phượng", "Phát", "Phi", "Phước", "Quân", "Quang", "Quốc", "Quý", "Quỳnh", "Quyết", "Quyền", "Quế", "Sơn", "Sang", "Sáng", "Sinh", "Tâm", "Tấn", "Thắng", "Thành", "Thảo", "Thư", "Tiến", "Toàn", "Trang", "Triết", "Trí", "Trúc", "Trung", "Tú", "Tuấn", "Tùng", "Tường", "Tuyên", "Tuyết", "Thùy", "Thúy", "Thuận", "Thanh", "Thi", "Thịnh", "Thông", "Thái", "Thiện", "Uyên", "Uy", "Uyển", "Vinh", "Vượng", "Vy", "Vân", "Việt", "Vũ", "Văn", "Vi", "Viễn", "Xuân", "Xuyên", "Xuyến", "Yến", "Ý", "Yên", "Ân", "Ánh", "Tuệ", "Khê", "Di", "Trâm", "Nhã", "Vỹ", "Du", "Hy", "Trọng", "Hoàng", "Tài", "Tín", "Cẩm", "Gấm", "Thu", "Vĩ"];

        function removeVietnameseTones(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').toLowerCase().replace(/\s/g, '');
        }

        function createIdentity() {
            const ho = dsHo[Math.floor(Math.random() * dsHo.length)];
            const isNam = Math.random() > 0.5;
            const dem = isNam ? dsDemNam[Math.floor(Math.random() * dsDemNam.length)] : dsDemNu[Math.floor(Math.random() * dsDemNu.length)];
            let ten;
            do { ten = dsTen[Math.floor(Math.random() * dsTen.length)]; } while (ten === dem);
            
            const fullName = `${ho} ${dem} ${ten}`;
            const h = removeVietnameseTones(ho);
            const d = removeVietnameseTones(dem);
            const t = removeVietnameseTones(ten);

            // KIỂU MỚI: Chỉ viết tắt 1 phần (Họ hoặc Đệm), phần còn lại giữ nguyên
            const styles = [
                `${h.charAt(0)}${d}${t}`, // h.vankha -> hvankha
                `${h}${d.charAt(0)}${t}`, // hoang.v.kha -> hoangvkha
                `${h}${t}`                // hoangkha (bỏ đệm)
            ];
            
            let namePart = styles[Math.floor(Math.random() * styles.length)];

            // Tiền tố ngẫu nhiên thoáng hơn
            const chars = 'abefghiklmnopqrstxyz';
            const pre = chars[Math.floor(Math.random() * chars.length)] + (Math.floor(Math.random() * 8) + 2) + chars[Math.floor(Math.random() * chars.length)];
            const suffix = Math.floor(Math.random() * 8999 + 1000);

            // Tạo username ngẫu nhiên giữa kiểu có tiền tố hoặc hậu tố
            let user = Math.random() > 0.5 ? `${pre}_${namePart}` : `${namePart}${suffix}`;
            
            // Fix các cụm từ nhạy cảm
            user = user.replace(/dm/g, "dn").replace(/vl/g, "vn").replace(/cl/g, "ck").replace(/cc/g, "cn");

            return { fullName, user };
        }

        function generateList() {
            const count = parseInt(document.getElementById('quantity-input').value) || 10;
            const container = document.getElementById('results-container');
            container.innerHTML = ''; 

            for (let i = 0; i < count; i++) {
                const data = createIdentity();
                const div = document.createElement('div');
                div.className = "row-item flex items-center justify-between p-4 cursor-pointer";
                div.onclick = () => copyValue(data.user);
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Họ và tên</span>
                        <span class="text-sm font-semibold text-slate-700">${data.fullName}</span>
                    </div>
                    <div class="text-right">
                        <span class="user-badge px-3 py-1 rounded-md text-xs font-mono font-bold tracking-tight">@${data.user}</span>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function copyValue(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerHTML = `✅ Đã chép: <span class="text-green-400 ml-1 font-mono">${text}</span>`;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 1500);
            });
        }
        window.onload = generateList;
    </script>
</body>
</html>
